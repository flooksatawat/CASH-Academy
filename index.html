<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องเรียนตัวแทนประกันชีวิต (Agent Academy)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const { useState, useEffect, useRef } = React;

        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'insurance-class-demo';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        // ==========================================
        // 2. ข้อมูลวิดีโอหลักสูตร (Google Drive ทั้งหมด)
        // ==========================================
        const COURSE_VIDEOS = [
            { id: 'ใส่_ID_วิดีโอ_1_ที่นี่', type: 'gdrive', title: 'บทที่ 1: แบบประกัน CI Extra Plus', duration: '3:32' },
            { id: '15JXmCHGp0n6UzpexBYJLEk7XQvxDfVCM', type: 'gdrive', title: 'บทที่ 2: แบบประกัน Signature Lagecy', duration: '0:28' },
            { id: 'ใส่_ID_วิดีโอ_3_ที่นี่', type: 'gdrive', title: 'บทที่ 3: พื้นฐานแบบประกัน', duration: '1:30' },
            { id: 'ใส่_ID_วิดีโอ_4_ที่นี่', type: 'gdrive', title: 'บทที่ 4: เทคนิคการเปิดใจลูกค้า', duration: '3:50' }
        ];

        const ADDITIONAL_DOCS = [
            { id: 1, title: 'คู่มือเตรียมสอบใบอนุญาตตัวแทน.pdf', size: '2.4 MB', type: 'PDF', url: '' },
            { id: 2, title: 'สรุปแผนประกัน (อัปเดตล่าสุด).pdf', size: '1.1 MB', type: 'PDF', url: '' },
            { id: 3, title: 'แบบฟอร์มคำขอเอาประกันชีวิต.pdf', size: '800 KB', type: 'PDF', url: '' },
            { id: 4, title: 'Excel ข้อเสนอ CI Extra Plus', size: 'ลิงก์ภายนอก', type: 'EXCEL', url: 'https://shorturl.at/DmPL4' }
        ];

        // ==========================================
        // 3. Components หลัก
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [progress, setProgress] = useState({});
            const [currentVideo, setCurrentVideo] = useState(COURSE_VIDEOS[0]);
            const [playerReady, setPlayerReady] = useState(false);
            const [toasts, setToasts] = useState([]);
            
            const [showDocs, setShowDocs] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [webhookUrl, setWebhookUrl] = useState('');

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });

                const savedWebhook = localStorage.getItem('insurance_webhook_url');
                if (savedWebhook) setWebhookUrl(savedWebhook);

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const progressRef = collection(db, 'artifacts', appId, 'users', user.uid, 'progress');
                
                const unsubscribe = onSnapshot(progressRef, (snapshot) => {
                    const newProgress = {};
                    snapshot.forEach(doc => {
                        newProgress[doc.id] = doc.data().completed;
                    });
                    setProgress(newProgress);
                });

                return () => unsubscribe();
            }, [user]);

            const handleVideoCompleted = async (video) => {
                if (progress[video.id]) return;

                setProgress(prev => ({ ...prev, [video.id]: true }));
                addToast(`🎉 ยินดีด้วย! คุณเรียนจบ: ${video.title}`, 'success');

                if (user && db) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', video.id);
                        await setDoc(docRef, {
                            completed: true,
                            completedAt: new Date().toISOString(),
                            videoTitle: video.title
                        }, { merge: true });
                    } catch (err) {
                        console.error("Failed to save progress", err);
                    }
                }

                sendLineNotification(video.title);
            };

            const sendLineNotification = async (videoTitle) => {
                const agentName = user ? `ตัวแทน ID: ${user.uid.substring(0, 6)}` : "ตัวแทนใหม่";
                const message = `\n🎓 แจ้งเตือนการเรียน\nผู้เรียน: ${agentName}\nเรียนจบ: ${videoTitle}\nสถานะ: ผ่าน ✅`;

                if (!webhookUrl) {
                    setTimeout(() => addToast(`(จำลอง LINE) 🔔 ${message}`, 'info'), 1000);
                    return;
                }

                try {
                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message, video: videoTitle, user: agentName })
                    });
                    addToast(`ส่งแจ้งเตือนเข้า LINE กลุ่มสำเร็จ!`, 'success');
                } catch (error) {
                    addToast(`ระบบส่งแจ้งเตือนล้มเหลว (ตรวจสอบ Webhook URL)`, 'error');
                }
            };

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
            };

            const saveSettings = () => {
                localStorage.setItem('insurance_webhook_url', webhookUrl);
                setShowSettings(false);
                addToast('บันทึกการตั้งค่าระบบเรียบร้อย', 'success');
            };

            const calculateTotalProgress = () => {
                const total = COURSE_VIDEOS.length;
                const completed = COURSE_VIDEOS.filter(v => progress[v.id]).length;
                return Math.round((completed / total) * 100);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-blue-900 text-white shadow-md z-10 relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <svg className="w-8 h-8 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 14l9-5-9-5-9 5 9 5zm0 0v6" /></svg>
                                <h1 className="text-xl font-bold tracking-wide">ห้องเรียนออนไลน์ สำนักงานปัญญา-อินทรา</h1>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={() => setShowDocs(true)} className="text-blue-200 hover:text-white transition-colors flex items-center gap-2 text-sm">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    เอกสารเพิ่มเติม
                                </button>
                                <button onClick={() => setShowSettings(true)} className="text-blue-200 hover:text-white transition-colors flex items-center gap-2 text-sm">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    ตั้งค่าผู้ดูแล
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
                        <div className="flex-1 flex flex-col">
                            {/* Video Player Container */}
                            <div className="bg-black rounded-xl overflow-hidden shadow-lg relative flex items-center justify-center" style={{ paddingTop: '56.25%' }}>
                                
                                {/* Google Drive Player */}
                                <iframe 
                                    src={`https://drive.google.com/file/d/${currentVideo.id}/preview`} 
                                    className="absolute top-0 left-0 w-full h-full border-0 bg-gray-900"
                                    allow="autoplay"
                                ></iframe>
                            </div>
                            
                            <div className="mt-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs font-bold">Google Drive</span>
                                            <h2 className="text-xl font-bold text-gray-800">{currentVideo.title}</h2>
                                        </div>
                                        <p className="text-gray-500 text-sm">
                                            เมื่อดูวิดีโอนี้จนจบแล้ว กรุณากดปุ่มด้านขวามือเพื่อยืนยันการผ่านบทเรียน
                                        </p>
                                    </div>

                                    {/* Action Area for Completed / Confirm Button */}
                                    {progress[currentVideo.id] ? (
                                        <div className="bg-green-100 text-green-700 px-6 py-3 rounded-full flex items-center gap-2 font-bold border border-green-200 w-full sm:w-auto justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                            เรียนจบแล้ว
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => handleVideoCompleted(currentVideo)}
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full flex items-center gap-2 font-bold shadow-md transition-all w-full sm:w-auto justify-center"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                            คลิกยืนยันเมื่อเรียนจบ
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="w-full lg:w-1/3 flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">ความคืบหน้าหลักสูตร</h3>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-sm font-medium text-gray-600">สถานะรวม</span>
                                    <span className="text-sm font-bold text-blue-600">{calculateTotalProgress()}%</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                    <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${calculateTotalProgress()}%` }}></div>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex-1">
                                <div className="bg-gray-50 p-4 border-b border-gray-100">
                                    <h3 className="font-bold text-gray-800">สารบัญบทเรียน</h3>
                                </div>
                                <ul className="divide-y divide-gray-100 max-h-[500px] overflow-y-auto">
                                    {COURSE_VIDEOS.map((video, index) => {
                                        const isCurrent = currentVideo.id === video.id;
                                        const isCompleted = progress[video.id];

                                        return (
                                            <li 
                                                key={video.id}
                                                onClick={() => setCurrentVideo(video)}
                                                className={`p-4 cursor-pointer hover:bg-blue-50 transition-colors flex gap-3 ${isCurrent ? 'bg-blue-50 border-l-4 border-blue-500' : 'border-l-4 border-transparent'}`}
                                            >
                                                <div className="flex-shrink-0 mt-1">
                                                    {isCompleted ? (
                                                        <div className="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                        </div>
                                                    ) : (
                                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold ${isCurrent ? 'border-blue-500 text-blue-500' : 'border-gray-300 text-gray-400'}`}>
                                                            {index + 1}
                                                        </div>
                                                    )}
                                                </div>
                                                <div>
                                                    <p className={`font-medium text-sm leading-tight mb-1 ${isCurrent ? 'text-blue-700' : 'text-gray-700'}`}>
                                                        {video.title}
                                                    </p>
                                                    <p className="text-xs text-gray-500">{video.duration} นาที</p>
                                                </div>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        </div>
                    </main>

                    {/* Toasts */}
                    <div className="fixed bottom-4 right-4 flex flex-col gap-2 z-50">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium flex items-center gap-2 ${toast.type === 'success' ? 'bg-green-600' : toast.type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`}>
                                {toast.message}
                            </div>
                        ))}
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-gray-800">ตั้งค่า LINE แจ้งเตือน</h2>
                                </div>
                                <div className="p-6">
                                    <input type="text" value={webhookUrl} onChange={(e) => setWebhookUrl(e.target.value)} placeholder="https://script.google.com/macros/..." className="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none text-sm mb-4" />
                                    <div className="flex gap-3 justify-end">
                                        <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg text-sm">ยกเลิก</button>
                                        <button onClick={saveSettings} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">บันทึก</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Docs Modal */}
                    {showDocs && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden">
                                <div className="p-6 border-b border-gray-100 bg-blue-50">
                                    <h2 className="text-xl font-bold text-blue-900">เอกสารประกอบการเรียน</h2>
                                </div>
                                <div className="p-6 max-h-[60vh] overflow-y-auto">
                                    <ul className="divide-y divide-gray-100">
                                        {ADDITIONAL_DOCS.map(doc => (
                                            <li key={doc.id} className="py-4 flex justify-between items-center">
                                                <div><p className="text-sm font-bold">{doc.title}</p></div>
                                                <button onClick={() => doc.url ? window.open(doc.url) : addToast(`ระบบจำลอง: ดาวน์โหลด ${doc.title}`)} className="text-blue-600 border border-blue-100 p-2 rounded-lg">
                                                    ดาวน์โหลด
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="p-4 border-t bg-gray-50 flex justify-end">
                                    <button onClick={() => setShowDocs(false)} className="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">ปิด</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
